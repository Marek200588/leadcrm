# Render Blueprint — provisions backend, database, and frontend together.
# In Render: New → Blueprint → connect this repo → Apply.

databases:
  - name: leadcrm-db
    databaseName: leadcrm
    plan: free

services:
  # --- Backend API (FastAPI) ---
  - type: web
    name: leadcrm-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leadcrm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: CORS_ORIGINS
        sync: false                   # set manually to the frontend URL after first deploy
      - key: PYTHON_VERSION
        value: "3.12.7"

  # --- Frontend (React static site) ---
  - type: web
    name: leadcrm-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false                   # set manually to the backend URL after first deploy
    routes:
      - type: rewrite                 # SPA fallback — all paths serve index.html
        source: /*
        destination: /index.html
