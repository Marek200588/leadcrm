# Render Blueprint — provisions backend, database, and frontend together.
# In Render: New → Blueprint → connect this repo → Apply.

databases:
  - name: leadcrm-db
    databaseName: leadcrm
    plan: free

services:
  # --- Backend API (FastAPI) ---
  # Free plan is the default for web services; declaring "plan: free"
  # explicitly is rejected, so we omit it.
  - type: web
    name: leadcrm-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leadcrm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"

  # --- Frontend (React static site) ---
  - type: web
    name: leadcrm-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
